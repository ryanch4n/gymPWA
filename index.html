<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Gym</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --bg: #000; --bg2: #1c1c1e; --bg3: #2c2c2e; --bg4: #3a3a3c;
  --text: #fff; --text2: #ababab; --text3: #636366;
  --blue: #0a84ff; --red: #ff453a; --green: #30d158; --yellow: #ffd60a; --orange: #ff9f0a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; background:var(--bg); }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Helvetica Neue',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100dvh; position:fixed; width:100%; }
button { font-family:inherit; border:none; cursor:pointer; background:none; color:inherit; font-size:inherit; }
input,textarea { font-family:inherit; font-size:16px; background:var(--bg3); color:var(--text); border:1px solid var(--bg4); border-radius:8px; padding:10px 12px; outline:none; width:100%; }
textarea { resize:none; min-height:60px; }
input:focus,textarea:focus { border-color:var(--blue); }
select { font-family:inherit; font-size:16px; background:var(--bg3); color:var(--text); border:1px solid var(--bg4); border-radius:8px; padding:10px 12px; width:100%; outline:none; -webkit-appearance:none; }

/* Animations */
@keyframes slideInRight { from { transform:translateX(100%); } to { transform:translateX(0); } }
@keyframes slideOutRight { from { transform:translateX(0); } to { transform:translateX(100%); } }
@keyframes slideInUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes slideOutDown { from { transform:translateY(0); } to { transform:translateY(100%); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes fadeOut { from { opacity:1; } to { opacity:0; } }

.slide-in { animation: slideInRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
.slide-out { animation: slideOutRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
.modal-enter { animation: slideInUp 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
.modal-exit { animation: slideOutDown 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
.fade-in { animation: fadeIn 0.2s ease forwards; }
.fade-out { animation: fadeOut 0.2s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext, useMemo } = React;

// ==================== CONSTANTS ====================
const DB_KEY = 'gym_data';
const CATEGORIES = [
  { id:'push', name:'Push', iconName:'chevrons-up' },
  { id:'pull', name:'Pull', iconName:'chevrons-down' },
  { id:'legs', name:'Legs', iconName:'footprints' },
  { id:'shoulders_arms', name:'Shoulders/Arms', iconName:'biceps-flexed' },
  { id:'abs', name:'Abs', iconName:'target' }
];
const REP_RANGES = ['6-8 Reps','8-10 Reps','8-12 Reps','10-12 Reps','12-15 Reps','15-20 Reps','Til Failure'];
const EFFORT_LABELS = ['Clean','Hard','Very Hard','Failure'];
const EFFORT_COLORS = ['#30d158','#ffd60a','#ff9f0a','#ff453a'];

// ==================== ICONS ====================
const ICON_PATHS = {
  'chevron-left': '<polyline points="15 18 9 12 15 6"/>',
  'chevron-down': '<polyline points="6 9 12 15 18 9"/>',
  'chevrons-up': '<polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/>',
  'chevrons-down': '<polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/>',
  'footprints': '<path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/>',
  'dumbbell': '<rect x="2" y="10" width="3" height="4" rx="1"/><rect x="19" y="10" width="3" height="4" rx="1"/><rect x="5" y="8" width="3" height="8" rx="1"/><rect x="16" y="8" width="3" height="8" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/>',
  'biceps-flexed': '<rect x="2" y="10" width="3" height="4" rx="1"/><rect x="19" y="10" width="3" height="4" rx="1"/><rect x="5" y="8" width="3" height="8" rx="1"/><rect x="16" y="8" width="3" height="8" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/>',
  'target': '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  'settings': '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
  'plus': '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  'archive': '<rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/>',
  'trash-2': '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
  'undo-2': '<path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11"/>',
  'timer': '<line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="12" y2="8"/><circle cx="12" cy="14" r="8"/>',
  'download': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  'upload': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  'x': '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  'calendar': '<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>',
  'play': '<polygon points="6 3 20 12 6 21 6 3"/>',
};

function Icon({ name, size = 22, style = {} }) {
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      strokeWidth="2"
      strokeLinecap="round"
      strokeLinejoin="round"
      style={{ display:'inline-block', verticalAlign:'middle', ...style }}
      dangerouslySetInnerHTML={{ __html: ICON_PATHS[name] || '' }}
    />
  );
}

// ==================== HELPERS ====================
function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

// ==================== DATA LAYER ====================
function loadData() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData(data) {
  localStorage.setItem(DB_KEY, JSON.stringify(data));
}

async function initSeedData() {
  let data = {};
  try {
    const resp = await fetch('data.json');
    data = await resp.json();
    CATEGORIES.forEach(c => {
      if (data[c.id] && data[c.id].exercises) {
        data[c.id].exercises.forEach(ex => { if (!ex.id) ex.id = uuid(); });
      }
    });
  } catch(e) {
    CATEGORIES.forEach(c => {
      data[c.id] = { version:1, category:c.id, exercises:[] };
    });
  }
  saveData(data);
  return data;
}

function getActiveExercises(data, catId) {
  return (data[catId]?.exercises || []).filter(e => e.active !== false);
}

function getArchivedExercises(data, catId) {
  return (data[catId]?.exercises || []).filter(e => e.active === false);
}

function getExercise(data, catId, exId) {
  return (data[catId]?.exercises || []).find(e => e.id === exId);
}

function getLatestSession(exercise) {
  if (!exercise.sessions || !exercise.sessions.length) return null;
  return [...exercise.sessions].sort((a, b) => b.date.localeCompare(a.date))[0];
}

// ==================== COMPONENTS ====================

// --- Tab Bar ---
function TabBar({ currentTab, onSwitchTab }) {
  const tabs = [
    ...CATEGORIES.map(c => ({ id:c.id, name:c.name, iconName:c.iconName })),
    { id:'settings', name:'Settings', iconName:'settings' }
  ];

  return (
    <div style={{
      display:'flex', borderTop:'1px solid var(--bg3)', background:'var(--bg2)',
      paddingBottom:'var(--safe-bottom)', flexShrink:0
    }}>
      {tabs.map(t => (
        <button
          key={t.id}
          onClick={() => onSwitchTab(t.id)}
          style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center',
            padding:'8px 0 4px', fontSize:'10px', gap:'2px',
            color: currentTab === t.id ? 'var(--blue)' : 'var(--text3)',
            background:'none'
          }}
        >
          <span style={{ lineHeight:0 }}><Icon name={t.iconName} size={18} /></span>
          <span>{t.name}</span>
        </button>
      ))}
    </div>
  );
}

// --- Confirm Dialog ---
function ConfirmDialog({ title, message, onConfirm, onCancel }) {
  return (
    <div className="fade-in" style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:200,
      display:'flex', alignItems:'center', justifyContent:'center'
    }}>
      <div style={{
        background:'var(--bg2)', borderRadius:'14px', width:'270px',
        overflow:'hidden', textAlign:'center'
      }}>
        <div style={{ fontSize:'17px', fontWeight:600, padding:'20px 16px 4px' }}>{title}</div>
        <div style={{ fontSize:'13px', color:'var(--text2)', padding:'4px 16px 16px' }}>{message}</div>
        <div style={{ borderTop:'1px solid var(--bg3)', display:'flex' }}>
          <button onClick={onCancel} style={{ flex:1, padding:'12px', fontSize:'17px', borderRight:'1px solid var(--bg3)' }}>Cancel</button>
          <button onClick={onConfirm} style={{ flex:1, padding:'12px', fontSize:'17px', color:'var(--red)', fontWeight:600 }}>Delete</button>
        </div>
      </div>
    </div>
  );
}

// --- Set Badge ---
function SetBadge({ set }) {
  const effortStyles = [
    { background:'rgba(48,209,88,0.2)', color:'var(--green)', border:'1px solid rgba(48,209,88,0.4)' },
    { background:'rgba(255,214,10,0.2)', color:'var(--yellow)', border:'1px solid rgba(255,214,10,0.4)' },
    { background:'rgba(255,159,10,0.2)', color:'var(--orange)', border:'1px solid rgba(255,159,10,0.4)' },
    { background:'rgba(255,69,58,0.2)', color:'var(--red)', border:'1px solid rgba(255,69,58,0.4)' },
  ];
  const s = effortStyles[set.effort] || effortStyles[0];
  return (
    <span style={{
      fontSize:'11px', padding:'4px 8px', borderRadius:'6px', textAlign:'center',
      fontWeight:600, ...s
    }}>
      {Math.round(set.weight)}lbs &times;{set.reps}
    </span>
  );
}

// --- Empty State ---
function EmptyState({ iconName, title, subtitle }) {
  return (
    <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text3)' }}>
      <div style={{ fontSize:'48px', marginBottom:'12px', lineHeight:0 }}>
        <Icon name={iconName} size={40} />
      </div>
      <div style={{ fontSize:'18px', fontWeight:600, color:'var(--text2)' }}>{title}</div>
      {subtitle && <div style={{ fontSize:'14px', marginTop:'4px' }}>{subtitle}</div>}
    </div>
  );
}

// --- Stepper ---
function Stepper({ value, onChange, onStep, inputMode = 'decimal' }) {
  return (
    <div style={{ display:'flex', alignItems:'center' }}>
      <button onClick={() => onStep(-1)} style={{
        width:'36px', height:'36px', background:'var(--bg4)', color:'var(--blue)',
        fontSize:'20px', fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center',
        borderRadius:'8px 0 0 8px'
      }}>-</button>
      <input
        type="number"
        inputMode={inputMode}
        value={value}
        onChange={e => onChange(parseFloat(e.target.value) || 0)}
        style={{
          width:'56px', height:'36px', borderRadius:0, textAlign:'center',
          borderLeft:'none', borderRight:'none', fontWeight:600
        }}
      />
      <button onClick={() => onStep(1)} style={{
        width:'36px', height:'36px', background:'var(--bg4)', color:'var(--blue)',
        fontSize:'20px', fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center',
        borderRadius:'0 8px 8px 0'
      }}>+</button>
    </div>
  );
}

// --- Set Editor ---
function SetEditor({ setIndex, set, onUpdate, onDelete, onShowTimer }) {
  return (
    <div style={{ background:'var(--bg3)', borderRadius:'10px', padding:'12px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px' }}>
        <span style={{ fontSize:'15px', fontWeight:600 }}>Set {setIndex + 1}</span>
        <button onClick={onDelete} style={{ color:'var(--red)' }}><Icon name="trash-2" size={16} /></button>
      </div>
      <div style={{ display:'flex', gap:'10px', marginBottom:'10px' }}>
        <div style={{ flex:1 }}>
          <label style={{ fontSize:'12px', color:'var(--text2)', display:'block', marginBottom:'4px' }}>Weight (lbs)</label>
          <Stepper
            value={set.weight}
            onChange={v => onUpdate({ ...set, weight: v })}
            onStep={d => onUpdate({ ...set, weight: Math.max(0, set.weight + d * 2.5) })}
            inputMode="decimal"
          />
        </div>
        <div style={{ flex:1 }}>
          <label style={{ fontSize:'12px', color:'var(--text2)', display:'block', marginBottom:'4px' }}>Reps</label>
          <Stepper
            value={set.reps}
            onChange={v => onUpdate({ ...set, reps: v })}
            onStep={d => onUpdate({ ...set, reps: Math.max(0, set.reps + d) })}
            inputMode="numeric"
          />
        </div>
      </div>
      <div style={{ display:'flex', gap:'6px' }}>
        {[0,1,2,3].map(e => (
          <button
            key={e}
            onClick={() => onUpdate({ ...set, effort: e })}
            style={{
              flex:1, padding:'8px 4px', borderRadius:'8px', textAlign:'center',
              fontSize:'11px', fontWeight:600, opacity: set.effort === e ? 1 : 0.4,
              transition:'opacity 0.15s',
              background: [
                'rgba(48,209,88,0.25)','rgba(255,214,10,0.25)',
                'rgba(255,159,10,0.25)','rgba(255,69,58,0.25)'
              ][e],
              color: EFFORT_COLORS[e]
            }}
          >
            {EFFORT_LABELS[e]}
          </button>
        ))}
      </div>
      <button onClick={onShowTimer} style={{
        display:'block', width:'100%', padding:'10px', marginTop:'8px',
        background:'rgba(10,132,255,0.15)', color:'var(--blue)',
        fontSize:'14px', fontWeight:600, borderRadius:'8px', textAlign:'center'
      }}>
        <Icon name="timer" size={16} /> Rest Timer
      </button>
    </div>
  );
}

// --- Rest Timer ---
function RestTimer({ onClose }) {
  const [running, setRunning] = useState(false);
  const [remaining, setRemaining] = useState(0);
  const [total, setTotal] = useState(0);
  const intervalRef = useRef(null);

  useEffect(() => {
    return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
  }, []);

  const startRest = (duration) => {
    setRemaining(duration);
    setTotal(duration);
    setRunning(true);
    if (intervalRef.current) clearInterval(intervalRef.current);
    let rem = duration;
    intervalRef.current = setInterval(() => {
      rem--;
      if (rem > 0) {
        setRemaining(rem);
        if ([10,5,3].includes(rem) && navigator.vibrate) navigator.vibrate(200);
      } else {
        setRemaining(0);
        if (navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          osc.frequency.value = 880;
          osc.connect(ctx.destination);
          osc.start();
          setTimeout(() => { osc.stop(); ctx.close(); }, 300);
        } catch(e) {}
        clearInterval(intervalRef.current);
        intervalRef.current = null;
        setRunning(false);
      }
    }, 1000);
  };

  const addTime = () => {
    setRemaining(r => r + 30);
    setTotal(t => t + 30);
  };

  const stop = () => {
    if (intervalRef.current) clearInterval(intervalRef.current);
    intervalRef.current = null;
    setRunning(false);
    setRemaining(0);
    setTotal(0);
  };

  const handleClose = () => {
    stop();
    onClose();
  };

  const pct = total > 0 ? remaining / total : 0;
  const circumference = 2 * Math.PI * 42;
  const offset = circumference * (1 - pct);
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const urgent = remaining <= 10;

  return (
    <div style={{
      position:'fixed', bottom:'80px', left:'16px', right:'16px', zIndex:90,
      background:'var(--bg2)', borderRadius:'20px', padding:'20px',
      boxShadow:'0 8px 32px rgba(0,0,0,0.5)', border:'1px solid var(--bg3)',
      backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)'
    }}>
      <button onClick={handleClose} style={{
        position:'absolute', top:'12px', right:'16px', color:'var(--text3)'
      }}>
        <Icon name="x" size={20} />
      </button>

      {!running ? (
        <div style={{ display:'flex', gap:'8px' }}>
          {[60,90,120,180].map(d => (
            <button key={d} onClick={() => startRest(d)} style={{
              flex:1, padding:'12px 8px', background:'var(--blue)', color:'#fff',
              fontSize:'15px', fontWeight:600, borderRadius:'10px', textAlign:'center'
            }}>
              {Math.floor(d/60)}:{String(d%60).padStart(2,'0')}
            </button>
          ))}
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'12px' }}>
          <div style={{ position:'relative', width:'100px', height:'100px' }}>
            <svg viewBox="0 0 100 100" style={{ width:'100px', height:'100px', transform:'rotate(-90deg)' }}>
              <circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg4)" strokeWidth="8" />
              <circle cx="50" cy="50" r="42" fill="none"
                stroke={urgent ? 'var(--red)' : 'var(--blue)'}
                strokeWidth="8" strokeLinecap="round"
                strokeDasharray={circumference} strokeDashoffset={offset}
                style={{ transition:'stroke-dashoffset 0.5s linear, stroke 0.3s' }}
              />
            </svg>
            <div style={{
              position:'absolute', inset:0, display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center'
            }}>
              <span style={{ fontSize:'26px', fontWeight:700, fontVariantNumeric:'tabular-nums' }}>
                {mins}:{String(secs).padStart(2, '0')}
              </span>
              <span style={{ fontSize:'11px', color:'var(--text3)' }}>remaining</span>
            </div>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button onClick={addTime} style={{
              padding:'8px 18px', borderRadius:'8px', fontSize:'14px', fontWeight:600,
              background:'rgba(48,209,88,0.2)', color:'var(--green)'
            }}>+30s</button>
            <button onClick={stop} style={{
              padding:'8px 18px', borderRadius:'8px', fontSize:'14px', fontWeight:600,
              background:'rgba(255,69,58,0.2)', color:'var(--red)'
            }}>Stop</button>
          </div>
        </div>
      )}
    </div>
  );
}

// --- Workout Modal ---
function WorkoutModal({ catId, data, onSave, onClose }) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const exercises = getActiveExercises(data, catId);

  const [date, setDate] = useState(todayStr());
  const [note, setNote] = useState('');
  const [exStates, setExStates] = useState(() =>
    exercises.map(ex => {
      const latest = getLatestSession(ex);
      let sets;
      if (latest && latest.sets.length > 0) {
        sets = latest.sets.map(s => ({ id: uuid(), weight: s.weight, reps: s.reps, effort: 0 }));
      } else {
        sets = [{ id: uuid(), weight: 0, reps: 0, effort: 0 }];
      }
      return { id: ex.id, name: ex.name, repRange: ex.repRange, sets, collapsed: false };
    })
  );
  const [showTimer, setShowTimer] = useState(false);

  const toggleCollapse = (ei) => {
    setExStates(prev => prev.map((ex, i) =>
      i === ei ? { ...ex, collapsed: !ex.collapsed } : ex
    ));
  };

  const updateSet = (ei, si, newSet) => {
    setExStates(prev => prev.map((ex, i) =>
      i === ei ? { ...ex, sets: ex.sets.map((s, j) => j === si ? newSet : s) } : ex
    ));
  };

  const deleteSet = (ei, si) => {
    setExStates(prev => prev.map((ex, i) =>
      i === ei ? { ...ex, sets: ex.sets.filter((_, j) => j !== si) } : ex
    ));
  };

  const addSet = (ei) => {
    setExStates(prev => prev.map((ex, i) => {
      if (i !== ei) return ex;
      const last = ex.sets[ex.sets.length - 1];
      return {
        ...ex,
        sets: [...ex.sets, { id: uuid(), weight: last ? last.weight : 0, reps: last ? last.reps : 0, effort: 0 }]
      };
    }));
  };

  const handleSave = () => {
    onSave({ catId, date, note, exercises: exStates });
  };

  return (
    <div className="fade-in" style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:100,
      display:'flex', alignItems:'flex-end', justifyContent:'center'
    }}>
      <div className="modal-enter" style={{
        background:'var(--bg2)', width:'100%', maxHeight:'92dvh',
        borderRadius:'16px 16px 0 0', display:'flex', flexDirection:'column',
        overflow:'hidden', paddingBottom:'var(--safe-bottom)'
      }}>
        <div style={{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          padding:'14px 16px', borderBottom:'1px solid var(--bg3)', flexShrink:0
        }}>
          <button onClick={onClose} style={{ fontSize:'17px', color:'var(--blue)', fontWeight:500 }}>Cancel</button>
          <h2 style={{ fontSize:'17px', fontWeight:600 }}>{cat.name} Workout</h2>
          <button onClick={handleSave} style={{ fontSize:'17px', color:'var(--blue)', fontWeight:500 }}>Save</button>
        </div>
        <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', padding:'16px' }}>
          {/* Date */}
          <div style={{ display:'flex', alignItems:'center', gap:'10px', paddingBottom:'8px' }}>
            <label style={{ fontSize:'15px', fontWeight:500, whiteSpace:'nowrap' }}>Date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ flex:1 }} />
          </div>

          {/* Notes */}
          <div style={{ marginBottom:'16px' }}>
            <label style={{ display:'block', fontSize:'14px', color:'var(--text2)', marginBottom:'6px', fontWeight:500 }}>Notes</label>
            <textarea placeholder="How was the workout?" value={note} onChange={e => setNote(e.target.value)} />
          </div>

          {/* Exercise sections */}
          {exStates.map((ex, ei) => (
            <div key={ex.id} style={{ marginBottom:'16px', borderRadius:'12px', overflow:'hidden' }}>
              <div style={{ padding:'14px', background:'rgba(10,132,255,0.12)' }}>
                <button onClick={() => toggleCollapse(ei)} style={{
                  width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', textAlign:'left'
                }}>
                  <div style={{ display:'flex', flexDirection:'column', gap:'2px' }}>
                    <div style={{ fontSize:'16px', fontWeight:600 }}>{ex.name}</div>
                    <div style={{ fontSize:'12px', color:'var(--text2)' }}>{ex.repRange}</div>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                    <span style={{ fontSize:'14px', color:'var(--text2)' }}>{ex.sets.length} {ex.sets.length === 1 ? 'set' : 'sets'}</span>
                    <span style={{
                      color:'var(--text3)', transition:'transform 0.2s',
                      transform: ex.collapsed ? 'rotate(-90deg)' : 'none',
                      display:'inline-block'
                    }}>
                      <Icon name="chevron-down" size={14} />
                    </span>
                  </div>
                </button>
              </div>
              {!ex.collapsed && (
                <div style={{ padding:'12px', background:'var(--bg2)', display:'flex', flexDirection:'column', gap:'12px' }}>
                  {ex.sets.map((s, si) => (
                    <SetEditor
                      key={s.id}
                      setIndex={si}
                      set={s}
                      onUpdate={newSet => updateSet(ei, si, newSet)}
                      onDelete={() => deleteSet(ei, si)}
                      onShowTimer={() => setShowTimer(true)}
                    />
                  ))}
                  <button onClick={() => addSet(ei)} style={{
                    display:'block', width:'100%', padding:'10px',
                    background:'rgba(10,132,255,0.15)', color:'var(--blue)',
                    fontSize:'14px', fontWeight:600, borderRadius:'8px', textAlign:'center'
                  }}>
                    <Icon name="plus" size={16} /> Add Set
                  </button>
                </div>
              )}
            </div>
          ))}
          <div style={{ height:'100px' }} />
        </div>
      </div>
      {showTimer && <RestTimer onClose={() => setShowTimer(false)} />}
    </div>
  );
}

// --- Settings View ---
function SettingsView({ data, onDataChange }) {
  const handleExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `gym-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (typeof imported !== 'object' || Array.isArray(imported)) {
            alert('Unrecognized file format.');
            return;
          }
          // Single category file (legacy iOS format)
          if (imported.version && imported.category && imported.exercises) {
            const catId = imported.category;
            if (!data[catId]) { alert('Unknown category: ' + catId); return; }
            imported.exercises.forEach(ex => { if (!ex.id) ex.id = uuid(); });
            const newData = { ...data, [catId]: imported };
            saveData(newData);
            onDataChange(newData);
            alert(`Imported ${imported.exercises.length} exercises into ${CATEGORIES.find(c=>c.id===catId)?.name || catId}`);
            return;
          }
          // Unified data.json format
          let count = 0;
          const newData = { ...data };
          CATEGORIES.forEach(c => {
            if (imported[c.id] && imported[c.id].exercises) {
              imported[c.id].exercises.forEach(ex => { if (!ex.id) ex.id = uuid(); });
              newData[c.id] = imported[c.id];
              count += imported[c.id].exercises.length;
            }
          });
          if (count > 0) {
            saveData(newData);
            onDataChange(newData);
            alert(`Imported ${count} exercises across ${CATEGORIES.filter(c=>imported[c.id]).length} categories.`);
          } else {
            alert('No valid workout data found in file.');
          }
        } catch(err) {
          alert('Error reading file: ' + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  return (
    <div>
      <div style={{ margin:'16px' }}>
        <h3 style={{
          fontSize:'13px', color:'var(--text3)', textTransform:'uppercase',
          letterSpacing:'0.5px', marginBottom:'8px', paddingLeft:'4px'
        }}>Data Management</h3>
        <div style={{ background:'var(--bg2)', borderRadius:'12px', overflow:'hidden' }}>
          <div style={{ padding:'13px 16px', borderBottom:'1px solid var(--bg3)' }}>
            <button onClick={handleExport} style={{ width:'100%', display:'flex', alignItems:'center', gap:'8px', textAlign:'left' }}>
              <Icon name="upload" size={18} />
              <span style={{ fontSize:'16px' }}>Export JSON Backup</span>
            </button>
          </div>
          <div style={{ padding:'13px 16px' }}>
            <button onClick={handleImport} style={{ width:'100%', display:'flex', alignItems:'center', gap:'8px', textAlign:'left' }}>
              <Icon name="download" size={18} />
              <span style={{ fontSize:'16px' }}>Import JSON File</span>
            </button>
          </div>
        </div>
      </div>

      <div style={{ margin:'16px' }}>
        <h3 style={{
          fontSize:'13px', color:'var(--text3)', textTransform:'uppercase',
          letterSpacing:'0.5px', marginBottom:'8px', paddingLeft:'4px'
        }}>Stats</h3>
        <div style={{ background:'var(--bg2)', borderRadius:'12px', overflow:'hidden' }}>
          {CATEGORIES.map((c, i) => {
            const total = (data[c.id]?.exercises || []).length;
            return (
              <div key={c.id} style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'13px 16px',
                borderBottom: i < CATEGORIES.length - 1 ? '1px solid var(--bg3)' : 'none'
              }}>
                <span style={{ fontSize:'16px' }}>{c.name}</span>
                <span style={{ fontSize:'16px', color:'var(--text3)' }}>{total} exercises</span>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ margin:'16px' }}>
        <h3 style={{
          fontSize:'13px', color:'var(--text3)', textTransform:'uppercase',
          letterSpacing:'0.5px', marginBottom:'8px', paddingLeft:'4px'
        }}>About</h3>
        <div style={{ background:'var(--bg2)', borderRadius:'12px', overflow:'hidden' }}>
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'13px 16px', borderBottom:'1px solid var(--bg3)'
          }}>
            <span style={{ fontSize:'16px' }}>Version</span>
            <span style={{ fontSize:'16px', color:'var(--text3)' }}>2.0 (React PWA)</span>
          </div>
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'13px 16px'
          }}>
            <span style={{ fontSize:'16px' }}>Storage</span>
            <span style={{ fontSize:'16px', color:'var(--text3)' }}>localStorage</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ==================== MAIN APP ====================
function App() {
  const [data, setData] = useState(null);
  const [currentTab, setCurrentTab] = useState('push');
  const [viewStack, setViewStack] = useState([{ view: 'category', params: {} }]);
  const [modal, setModal] = useState(null);
  const [modalParams, setModalParams] = useState({});
  const [confirmDialog, setConfirmDialog] = useState(null);

  // Init data
  useEffect(() => {
    (async () => {
      let d = loadData();
      if (!d) d = await initSeedData();
      setData(d);
    })();
  }, []);

  // Register service worker
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  }, []);

  const updateData = useCallback((newData) => {
    saveData(newData);
    setData({ ...newData });
  }, []);

  const currentView = viewStack[viewStack.length - 1];

  const navigate = useCallback((view, params = {}) => {
    setViewStack(prev => [...prev, { view, params }]);
  }, []);

  const goBack = useCallback(() => {
    setViewStack(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
  }, []);

  const switchTab = useCallback((tabId) => {
    setCurrentTab(tabId);
    setViewStack([{ view: tabId === 'settings' ? 'settings' : 'category', params: {} }]);
  }, []);

  const handleNewWorkout = (catId) => {
    setModalParams({ catId });
    setModal('workout');
  };

  const handleSaveWorkout = ({ catId, date, note, exercises: exStates }) => {
    const newData = JSON.parse(JSON.stringify(data));
    let saved = false;

    exStates.forEach(wex => {
      const hasValid = wex.sets.some(s => s.weight > 0 || s.reps > 0);
      if (!hasValid) return;

      const ex = getExercise(newData, catId, wex.id);
      if (!ex) return;

      if (!ex.sessions) ex.sessions = [];
      ex.sessions = ex.sessions.filter(s => s.date !== date);
      ex.sessions.push({
        date,
        note,
        sets: wex.sets.map(s => ({ weight: s.weight, reps: s.reps, effort: s.effort }))
      });
      saved = true;
    });

    if (saved) updateData(newData);
    setModal(null);
  };

  const handleAddExercise = ({ name, repRange }) => {
    const newData = JSON.parse(JSON.stringify(data));
    if (!newData[currentTab]) return;
    newData[currentTab].exercises.push({
      id: uuid(), name, repRange, active: true, sessions: []
    });
    updateData(newData);
    setModal(null);
  };

  const handleDeleteSession = (catId, exId, dateStr) => {
    setConfirmDialog({
      title: 'Delete Session',
      message: 'Are you sure you want to delete this workout session?',
      onConfirm: () => {
        const newData = JSON.parse(JSON.stringify(data));
        const ex = getExercise(newData, catId, exId);
        if (ex) {
          ex.sessions = (ex.sessions || []).filter(s => s.date !== dateStr);
          updateData(newData);
        }
        setConfirmDialog(null);
      }
    });
  };

  const handleRestoreExercise = (exId) => {
    const newData = JSON.parse(JSON.stringify(data));
    const ex = getExercise(newData, currentTab, exId);
    if (ex) { ex.active = true; updateData(newData); }
    setModal(null);
  };

  const handlePermanentDelete = (exId) => {
    setConfirmDialog({
      title: 'Delete Exercise',
      message: 'This will permanently delete this exercise and all its history.',
      onConfirm: () => {
        const newData = JSON.parse(JSON.stringify(data));
        if (newData[currentTab]) {
          newData[currentTab].exercises = newData[currentTab].exercises.filter(e => e.id !== exId);
          updateData(newData);
        }
        setConfirmDialog(null);
        setModal(null);
      }
    });
  };

  if (!data) return null;

  let headerTitle = '';
  let showBack = viewStack.length > 1;
  let showArchiveBtn = false;
  let showAddBtn = false;

  if (currentView.view === 'category') {
    const cat = CATEGORIES.find(c => c.id === currentTab);
    headerTitle = cat ? cat.name : '';
    showArchiveBtn = getArchivedExercises(data, currentTab).length > 0;
    showAddBtn = true;
  } else if (currentView.view === 'detail') {
    const ex = getExercise(data, currentView.params.catId, currentView.params.exId);
    headerTitle = ex ? ex.name : 'Exercise';
  } else if (currentView.view === 'settings') {
    headerTitle = 'Settings';
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100dvh' }}>
      {/* Header */}
      <div style={{
        padding: 'calc(var(--safe-top) + 8px) 16px 8px',
        background:'var(--bg)', borderBottom:'1px solid var(--bg3)', flexShrink:0
      }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
            {showBack && (
              <button onClick={goBack} style={{ color:'var(--blue)', padding:'6px' }}>
                <Icon name="chevron-left" size={22} />
              </button>
            )}
            <h1 style={{ fontSize:'28px', fontWeight:700 }}>{headerTitle}</h1>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            {showArchiveBtn && (
              <button onClick={() => setModal('archived')} style={{ padding:'6px', color:'var(--blue)' }}>
                <Icon name="archive" size={22} />
              </button>
            )}
            {showAddBtn && (
              <button onClick={() => setModal('addExercise')} style={{ padding:'6px', color:'var(--blue)' }}>
                <Icon name="plus" size={22} />
              </button>
            )}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', paddingBottom:'20px' }}>
        {currentView.view === 'category' && (
          <CategoryView
            catId={currentTab}
            data={data}
            onNavigateDetail={(catId, exId) => navigate('detail', { catId, exId })}
            onNewWorkout={handleNewWorkout}
          />
        )}
        {currentView.view === 'detail' && (
          <ExerciseDetailView
            catId={currentView.params.catId}
            exId={currentView.params.exId}
            data={data}
            onDeleteSession={handleDeleteSession}
          />
        )}
        {currentView.view === 'settings' && (
          <SettingsView data={data} onDataChange={setData} />
        )}
      </div>

      {/* Tab Bar */}
      <TabBar currentTab={currentTab} onSwitchTab={switchTab} />

      {/* Modals */}
      {modal === 'workout' && (
        <WorkoutModal
          catId={modalParams.catId}
          data={data}
          onSave={handleSaveWorkout}
          onClose={() => setModal(null)}
        />
      )}
      {modal === 'addExercise' && (
        <AddExerciseModal
          onSave={handleAddExercise}
          onClose={() => setModal(null)}
        />
      )}
      {modal === 'archived' && (
        <ArchivedModal
          catId={currentTab}
          data={data}
          onRestore={handleRestoreExercise}
          onDelete={handlePermanentDelete}
          onClose={() => setModal(null)}
        />
      )}

      {/* Confirm Dialog */}
      {confirmDialog && (
        <ConfirmDialog
          title={confirmDialog.title}
          message={confirmDialog.message}
          onConfirm={confirmDialog.onConfirm}
          onCancel={() => setConfirmDialog(null)}
        />
      )}
    </div>
  );
}

// ==================== MOUNT ====================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
