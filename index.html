// --- Exercise Detail View ---
function CombinedChart({ sessions }) {
  const [mode, setMode] = useState('avg');
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [selectedBarIdx, setSelectedBarIdx] = useState(null);
  const [dateRange, setDateRange] = useState('all');
  const [showInfo, setShowInfo] = useState(false);

  const RANGES = [
    { key: '1m', label: '1M', months: 1 },
    { key: '3m', label: '3M', months: 3 },
    { key: '6m', label: '6M', months: 6 },
    { key: '1y', label: '1Y', months: 12 },
    { key: 'all', label: 'All', months: 0 }
  ];

  const allSorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
  if (allSorted.length < 2) return null;

  const sorted = useMemo(() => {
    if (dateRange === 'all') return allSorted;
    const r = RANGES.find(r => r.key === dateRange);
    if (!r || !r.months) return allSorted;
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - r.months);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    return allSorted.filter(s => s.date >= cutoffStr);
  }, [allSorted.length, dateRange]);

  if (sorted.length < 2) return null;

  // --- Line chart data ---
  const points = sorted.map((s, i) => {
    const weights = (s.sets || []).map(set => set.weight).filter(w => w > 0);
    const windowStart = Math.max(0, i - 2);
    const windowSlice = sorted.slice(windowStart, i + 1);
    const rollingAvg = windowSlice.reduce((sum, ws) => {
      const ww = (ws.sets || []).map(set => set.weight).filter(w => w > 0);
      return sum + (ww.length > 0 ? ww.reduce((a, b) => a + b, 0) / ww.length : 0);
    }, 0) / windowSlice.length;
    return {
      date: s.date,
      weight: Math.max(...(s.sets || []).map(set => set.weight)),
      volume: (s.sets || []).reduce((sum, set) => sum + set.weight * set.reps, 0),
      avg: Math.round(rollingAvg * 10) / 10
    };
  });

  const values = points.map(p => mode === 'avg' ? p.avg : mode === 'weight' ? p.weight : p.volume);
  const minVal = Math.min(...values);
  const maxVal = Math.max(...values);
  const valRange = maxVal - minVal || 1;

  const W = 320;
  const H = 140;
  const longestLabel = Math.round(maxVal).toLocaleString().length;
  const padX = longestLabel * 7 + 6;
  const padY = 16;
  const chartW = W - padX - 4;
  const chartH = H - padY * 2;

  const getX = (i) => padX + (i / (points.length - 1)) * chartW;
  const getY = (v) => padY + chartH - ((v - minVal) / valRange) * chartH;

  const pathD = points.map((p, i) => {
    const v = mode === 'avg' ? p.avg : mode === 'weight' ? p.weight : p.volume;
    return `${i === 0 ? 'M' : 'L'}${getX(i).toFixed(1)},${getY(v).toFixed(1)}`;
  }).join(' ');

  const areaD = pathD + ` L${getX(points.length - 1).toFixed(1)},${H} L${getX(0).toFixed(1)},${H} Z`;

  const lastVal = values[values.length - 1];
  const firstVal = values[0];
  const trend = lastVal - firstVal;
  const trendPct = firstVal > 0 ? ((trend / firstVal) * 100).toFixed(0) : 0;
  const trendUp = trend >= 0;

  const formatVal = (v) => Math.round(v).toLocaleString();

  // --- Progression bar chart data ---
  const sessionVolAvgs = sorted.map(s => {
    const sets = (s.sets || []).filter(set => set.weight > 0 && set.reps > 0);
    return sets.length > 0 ? sets.reduce((sum, set) => sum + set.weight * set.reps, 0) / sets.length : 0;
  });

  const deltas = [];
  for (let i = 1; i < sessionVolAvgs.length; i++) {
    const currWindow = sessionVolAvgs.slice(Math.max(0, i - 2), i + 1);
    const prevWindow = sessionVolAvgs.slice(Math.max(0, i - 3), i);
    const currAvg = currWindow.reduce((s, v) => s + v, 0) / currWindow.length;
    const prevAvg = prevWindow.reduce((s, v) => s + v, 0) / prevWindow.length;
    const pctChange = prevAvg > 0 ? ((currAvg - prevAvg) / prevAvg) * 100 : 0;
    deltas.push({ date: sorted[i].date, delta: Math.round(pctChange * 10) / 10 });
  }

  const hasProgression = deltas.length >= 2;
  const maxAbs = hasProgression ? Math.max(...deltas.map(d => Math.abs(d.delta)), 1) : 1;
  const H2 = 80;
  const padY2 = 10;
  const chartH2 = H2 - padY2 * 2;
  const midY2 = padY2 + chartH2 / 2;
  const barW = hasProgression ? Math.max(4, Math.min(16, (chartW / deltas.length) * 0.7)) : 0;
  const barGap = hasProgression ? chartW / deltas.length : 0;

  const handleDateChange = (key) => {
    setDateRange(key);
    setSelectedIdx(null);
    setSelectedBarIdx(null);
  };

  // Compute date labels for x-axis (up to 5 evenly spaced)
  const dateLabelCount = Math.min(5, sorted.length);
  const dateLabels = [];
  for (let i = 0; i < dateLabelCount; i++) {
    const idx = Math.round(i * (sorted.length - 1) / (dateLabelCount - 1));
    dateLabels.push({ idx, date: sorted[idx].date, x: getX(idx) });
  }

  const deltaDateLabels = [];
  if (hasProgression) {
    const dCount = Math.min(5, deltas.length);
    for (let i = 0; i < dCount; i++) {
      const idx = Math.round(i * (deltas.length - 1) / (dCount - 1));
      const x = padX + idx * barGap + barGap / 2;
      deltaDateLabels.push({ date: deltas[idx].date, x });
    }
  }

  const subcardStyle = {
    background:'var(--bg2)', borderRadius:'10px',
    border:'1px solid var(--card-border)',
    margin:'0 10px', padding:'10px 4px 8px'
  };

  return (
    <div style={{
      margin:'12px 16px 8px', background:'var(--card)', borderRadius:'var(--radius)',
      border:'1px solid var(--card-border)', overflow:'hidden', boxShadow:'var(--shadow)', position:'relative',
      paddingBottom:'10px'
    }}>
      {/* Shared date range picker — top level */}
      <div style={{ display:'flex', gap:'4px', padding:'12px 14px 10px' }}>
        {RANGES.map(r => (
          <button key={r.key} onClick={() => handleDateChange(r.key)} style={{
            flex:1, padding:'5px 0', borderRadius:'5px', fontSize:'11px', fontWeight:600,
            background: dateRange === r.key ? 'var(--bg4)' : 'transparent',
            color: dateRange === r.key ? 'var(--text)' : 'var(--text3)',
            border: dateRange === r.key ? 'none' : '1px solid var(--input-border)', transition:'all 0.15s'
          }}>{r.label}</button>
        ))}
      </div>

      {/* Line chart subcard */}
      <div style={subcardStyle}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 10px 6px' }}>
          <div style={{ display:'flex', gap:'4px' }}>
            {[{key:'avg',label:'Avg Weight'},{key:'weight',label:'Max Weight'},{key:'volume',label:'Volume'}].map(m => (
              <button key={m.key} onClick={() => { setMode(m.key); setSelectedIdx(null); }} style={{
                padding:'4px 10px', borderRadius:'6px', fontSize:'11px', fontWeight:600,
                background: mode === m.key ? 'var(--blue)' : 'transparent',
                color: mode === m.key ? '#fff' : 'var(--text3)',
                border: mode === m.key ? 'none' : '1px solid var(--input-border)',
                transition:'all 0.15s'
              }}>{m.label}</button>
            ))}
          </div>
          <span style={{ fontSize:'11px', fontWeight:600, color: trendUp ? 'var(--green)' : 'var(--red)' }}>
            {trendUp ? '↑' : '↓'} {Math.abs(trendPct)}%
          </span>
        </div>
        <div style={{ padding:'0 6px' }}>
          <svg viewBox={`0 0 ${W} ${H + 14}`} style={{ width:'100%', height:'auto', display:'block' }}>
            <defs>
              <linearGradient id={'grad-' + mode} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="var(--blue)" stopOpacity="0.2"/>
                <stop offset="100%" stopColor="var(--blue)" stopOpacity="0"/>
              </linearGradient>
            </defs>
            {[0, 0.5, 1].map(pct => {
              const y = padY + chartH - pct * chartH;
              const val = minVal + pct * valRange;
              return <React.Fragment key={pct}>
                <line x1={padX} y1={y} x2={W - 4} y2={y} stroke="var(--card-border)" strokeWidth="0.5" />
                <text x={padX - 4} y={y + 3.5} textAnchor="end" fontSize="9" fill="var(--text3)">{formatVal(val)}</text>
              </React.Fragment>;
            })}
            <path d={areaD} fill={`url(#grad-${mode})`} />
            <path d={pathD} fill="none" stroke="var(--blue)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
            {points.map((p, i) => {
              const v = mode === 'avg' ? p.avg : mode === 'weight' ? p.weight : p.volume;
              const cx = getX(i);
              const cy = getY(v);
              const isSelected = selectedIdx === i;
              return <React.Fragment key={i}>
                {isSelected && (
                  <>
                    <line x1={cx} y1={padY} x2={cx} y2={padY + chartH} stroke="var(--blue)" strokeWidth="0.5" strokeDasharray="3,2" />
                    {(() => {
                      const label = formatVal(v) + (mode !== 'volume' ? 'lbs' : '') + '  ' + p.date.slice(5).replace('-','/');
                      const labelW = label.length * 5.2 + 12;
                      let tx = cx - labelW / 2;
                      if (tx < 2) tx = 2;
                      if (tx + labelW > W - 2) tx = W - 2 - labelW;
                      const ty = cy - 18;
                      return <>
                        <rect x={tx} y={ty} width={labelW} height={16} rx="4" fill="var(--bg4)" />
                        <text x={tx + labelW / 2} y={ty + 11.5} textAnchor="middle" fontSize="9" fontWeight="600" fill="var(--text)">{label}</text>
                      </>;
                    })()}
                  </>
                )}
                <circle cx={cx} cy={cy} r={isSelected ? 5 : 3} fill="var(--blue)" />
                <circle cx={cx} cy={cy} r="14" fill="transparent" onClick={() => setSelectedIdx(isSelected ? null : i)} />
              </React.Fragment>;
            })}
            {/* Date labels */}
            {dateLabels.map((dl, i) => (
              <text key={i} x={dl.x} y={H + 10} textAnchor="middle" fontSize="8" fill="var(--text3)">
                {dl.date.slice(5).replace('-','/')}
              </text>
            ))}
          </svg>
        </div>
      </div>

      {/* Progression bar chart subcard */}
      {hasProgression && (
        <div style={{ ...subcardStyle, marginTop:'8px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 10px 4px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
              <span style={{ fontSize:'11px', fontWeight:600, color:'var(--text3)' }}>Progression</span>
              <button onClick={() => setShowInfo(!showInfo)} style={{
                width:'14px', height:'14px', borderRadius:'50%', fontSize:'9px', fontWeight:700,
                background:'var(--bg3)', color:'var(--text3)', display:'flex', alignItems:'center', justifyContent:'center',
                lineHeight:1
              }}>?</button>
            </div>
            {selectedBarIdx !== null && deltas[selectedBarIdx] && (
              <span style={{
                fontSize:'11px', fontWeight:600,
                color: deltas[selectedBarIdx].delta >= 0 ? 'var(--green)' : 'var(--red)'
              }}>
                {deltas[selectedBarIdx].delta >= 0 ? '+' : ''}{deltas[selectedBarIdx].delta.toFixed(1)}%  {deltas[selectedBarIdx].date.slice(5).replace('-','/')}
              </span>
            )}
          </div>
          {showInfo && (
            <>
              <div onClick={() => setShowInfo(false)} style={{ position:'fixed', inset:0, zIndex:50 }} />
              <div style={{
                position:'absolute', left:'14px', right:'14px', zIndex:51,
                background:'var(--bg3)', borderRadius:'10px', padding:'12px', fontSize:'13px',
                color:'var(--text2)', lineHeight:'1.5', boxShadow:'0 4px 20px rgba(0,0,0,0.5)',
                border:'1px solid var(--bg4)'
              }}>
                Tracks your session-over-session momentum using <strong style={{ color:'var(--text)' }}>volume per set</strong> (weight × reps).
                Each bar shows the % change in your 3-session rolling average.
                <span style={{ color:'var(--green)' }}> Green</span> = improving,
                <span style={{ color:'var(--red)' }}> red</span> = declining.
              </div>
            </>
          )}
          <div style={{ padding:'0 6px' }}>
            <svg viewBox={`0 0 ${W} ${H2 + 14}`} style={{ width:'100%', height:'auto', display:'block' }}>
              <line x1={padX} y1={midY2} x2={W - 4} y2={midY2} stroke="var(--card-border)" strokeWidth="0.5" />
              <text x={padX - 4} y={padY2 + 4} textAnchor="end" fontSize="8" fill="var(--text3)">+{Math.round(maxAbs)}%</text>
              <text x={padX - 4} y={midY2 + 3} textAnchor="end" fontSize="8" fill="var(--text3)">0</text>
              <text x={padX - 4} y={padY2 + chartH2 + 1} textAnchor="end" fontSize="8" fill="var(--text3)">-{Math.round(maxAbs)}%</text>
              {deltas.map((d, i) => {
                const x = padX + i * barGap + (barGap - barW) / 2;
                const bH = (Math.abs(d.delta) / maxAbs) * (chartH2 / 2);
                const y = d.delta >= 0 ? midY2 - bH : midY2;
                const color = d.delta >= 0 ? 'var(--green)' : 'var(--red)';
                const isSel = selectedBarIdx === i;
                return <React.Fragment key={i}>
                  <rect x={x} y={y} width={barW} height={Math.max(bH, 0.5)} rx="2" fill={color} opacity={isSel ? 1 : 0.7} />
                  {isSel && <line x1={x + barW / 2} y1={padY2} x2={x + barW / 2} y2={padY2 + chartH2} stroke={color} strokeWidth="0.5" strokeDasharray="3,2" />}
                  <rect x={x - barGap * 0.15} y={padY2} width={barW + barGap * 0.3} height={chartH2} fill="transparent" onClick={() => setSelectedBarIdx(isSel ? null : i)} />
                </React.Fragment>;
              })}
              {/* Date labels */}
              {deltaDateLabels.map((dl, i) => (
                <text key={i} x={dl.x} y={H2 + 10} textAnchor="middle" fontSize="8" fill="var(--text3)">
                  {dl.date.slice(5).replace('-','/')}
                </text>
              ))}
            </svg>
          </div>
        </div>
      )}
    </div>
  );
}

function ExerciseDetailView({ catId, exId, data, onDeleteSession, onEditSession }) {
  const ex = getExercise(data, catId, exId);
  if (!ex) return null;
  const [openMenu, setOpenMenu] = useState(null);

  const sessions = [...(ex.sessions || [])].sort((a, b) => b.date.localeCompare(a.date));

  // Compute stats
  const allSetsWithDate = sessions.flatMap(s => (s.sets || []).map(set => ({ ...set, date: s.date })));
  const allSets = sessions.flatMap(s => s.sets || []);
  const bestSingle = allSetsWithDate.length > 0
    ? allSetsWithDate.reduce((best, s) => (s.weight > best.weight || (s.weight === best.weight && s.reps > best.reps)) ? s : best, allSetsWithDate[0])
    : null;
  const bestVolSession = sessions.length > 0
    ? sessions.reduce((best, s) => {
        const vol = (s.sets || []).reduce((sum, set) => sum + set.weight * set.reps, 0);
        return vol > (best.vol || 0) ? { vol, date: s.date } : best;
      }, { vol: 0, date: null })
    : { vol: 0, date: null };
  const bestVolume = bestVolSession.vol;
  const lastSession = sessions.length > 0 ? sessions[0] : null;
  const lastTopSet = lastSession ? Math.max(...(lastSession.sets || []).map(s => s.weight)) : 0;

  const formatWeight = (w) => Math.round(w).toLocaleString();

  return (
    <div className="slide-in">
      <CombinedChart sessions={sessions} />

      {sessions.length > 0 && (
        <div style={{ display:'flex', gap:'8px', margin:'0 16px 8px' }}>
          {[
            { label: 'PR', value: bestSingle ? `${Math.round(bestSingle.weight)}lbs × ${bestSingle.reps}` : '—', date: bestSingle ? formatDate(bestSingle.date) : '\u00A0' },
            { label: 'Best Volume', value: bestVolume > 0 ? formatWeight(bestVolume) + 'lbs' : '—', date: bestVolSession.date ? formatDate(bestVolSession.date) : '\u00A0' },
            { label: 'Last Top Set', value: lastTopSet > 0 ? Math.round(lastTopSet) + 'lbs' : '—', date: lastSession ? formatDate(lastSession.date) : '\u00A0' }
          ].map((card, i) => (
            <div key={i} style={{ flex:1, background:'var(--bg2)', borderRadius:'12px', padding:'12px', textAlign:'center' }}>
              <div style={{ fontSize:'11px', color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.3px', height:'14px' }}>{card.label}</div>
              <div style={{ fontSize:'17px', fontWeight:700, marginTop:'6px', height:'22px', display:'flex', alignItems:'center', justifyContent:'center' }}>{card.value}</div>
              <div style={{ fontSize:'11px', color:'var(--text3)', marginTop:'6px', height:'14px' }}>{card.date}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{ fontSize:'20px', fontWeight:700, padding:'8px 16px' }}>Workout History</div>

      {sessions.length === 0 ? (
        <EmptyState iconName="calendar" title="No workouts logged yet" subtitle="Start a new workout from the main screen" />
      ) : sessions.map((s, idx) => {
        const prevSession = idx < sessions.length - 1 ? sessions[idx + 1] : null;
        return (
        <div key={idx} style={{
          background:'var(--bg2)', borderRadius:'12px', padding:'14px', margin:'8px 16px'
        }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'start', position:'relative' }}>
            <div>
              <div style={{ fontSize:'16px', fontWeight:600 }}>{formatDate(s.date)}</div>
              {s.note && <div style={{ fontSize:'14px', color:'var(--text2)', marginTop:'2px' }}>{s.note}</div>}
            </div>
            <button onClick={() => setOpenMenu(openMenu === idx ? null : idx)} style={{ color:'var(--text3)', padding:'4px' }}>
              <Icon name="ellipsis-vertical" size={16} />
            </button>
            {openMenu === idx && (
              <>
                <div onClick={() => setOpenMenu(null)} style={{ position:'fixed', inset:0, zIndex:50 }} />
                <div style={{
                  position:'absolute', top:'100%', right:0, zIndex:51,
                  background:'var(--bg3)', borderRadius:'10px', overflow:'hidden',
                  boxShadow:'0 4px 20px rgba(0,0,0,0.5)', border:'1px solid var(--bg4)',
                  minWidth:'160px'
                }}>
                  <button onClick={() => { if (onEditSession) onEditSession(catId, exId, s.date); setOpenMenu(null); }} style={{
                    width:'100%', padding:'12px 16px', textAlign:'left',
                    fontSize:'15px', color:'var(--text)', display:'flex', alignItems:'center', gap:'10px',
                    borderBottom:'1px solid var(--bg4)'
                  }}>
                    <Icon name="edit" size={16} /> Edit Session
                  </button>
                  <button onClick={() => { onDeleteSession(catId, exId, s.date); setOpenMenu(null); }} style={{
                    width:'100%', padding:'12px 16px', textAlign:'left',
                    fontSize:'15px', color:'var(--red)', display:'flex', alignItems:'center', gap:'10px'
                  }}>
                    <Icon name="trash-2" size={16} /> Delete Session
                  </button>
                </div>
              </>
            )}
          </div>
          <div style={{ marginTop:'10px' }}>
            {s.sets.map((set, i) => {
              const prevSet = prevSession && prevSession.sets && prevSession.sets[i] ? prevSession.sets[i] : null;
              const wDiff = prevSet ? set.weight - prevSet.weight : 0;
              const rDiff = prevSet ? set.reps - prevSet.reps : 0;
              return (
              <div key={i} style={{
                display:'flex', alignItems:'center', padding:'4px 0', fontSize:'14px'
              }}>
                <span style={{ color:'var(--text3)', flex:1, textAlign:'center' }}>Set {i+1}</span>
                <span style={{ fontWeight:600, flex:1, display:'inline-flex', alignItems:'center', gap:'3px' }}>
                  {Math.round(set.weight)}lbs
                  {prevSet && wDiff !== 0 && (
                    <span style={{ fontSize:'10px', fontWeight:600, color: wDiff > 0 ? 'var(--green)' : 'var(--red)', display:'inline-flex', alignItems:'center', gap:'1px' }}>
                      <span style={{ fontSize:'8px' }}>{wDiff > 0 ? '\u25B2' : '\u25BC'}</span>{Math.abs(wDiff) % 1 === 0 ? Math.abs(wDiff) : Math.abs(wDiff).toFixed(1)}
                    </span>
                  )}
                </span>
                <span style={{ flex:1, display:'inline-flex', alignItems:'center', gap:'3px' }}>
                  &times; {set.reps} reps
                  {prevSet && rDiff !== 0 && (
                    <span style={{ fontSize:'10px', fontWeight:600, color: rDiff > 0 ? 'var(--green)' : 'var(--red)', display:'inline-flex', alignItems:'center', gap:'1px' }}>
                      <span style={{ fontSize:'8px' }}>{rDiff > 0 ? '\u25B2' : '\u25BC'}</span>{Math.abs(rDiff)}
                    </span>
                  )}
                </span>
                <span style={{ flex:1, display:'flex', alignItems:'center', gap:'6px', paddingLeft:'20px' }}>
                  <span style={{
                    width:'10px', height:'10px', borderRadius:'50%', flexShrink:0,
                    background: EFFORT_COLORS[set.effort] || '#636366'
                  }} />
                  <span style={{ fontSize:'12px', color:'var(--text3)' }}>{EFFORT_LABELS[set.effort] || ''}</span>
                </span>
              </div>
              );
            })}
          </div>
        </div>
        );
      })}
      <div style={{ height:'80px' }} />
    </div>
  );
}

// --- Settings View ---
function SettingsView({ data, onDataChange }) {
  const [notifEnabled, setNotifEnabled] = useState(() => localStorage.getItem('gym_notif') === 'true');
  const [notifStatus, setNotifStatus] = useState(() =>
    'Notification' in window ? Notification.permission : 'unsupported'
  );
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const toast = useToast();

  const handleNotifToggle = async () => {
    if (!('Notification' in window)) {
      toast('Notifications not supported on this device', 'error');
      return;
    }
    if (notifEnabled) {
      localStorage.setItem('gym_notif', 'false');
      setNotifEnabled(false);
      toast('Timer notifications disabled');
      return;
    }
    if (Notification.permission === 'denied') {
      toast('Notifications blocked — enable in iOS Settings → Gym', 'error');
      return;
    }
    if (Notification.permission === 'default') {
      const result = await Notification.requestPermission();
      setNotifStatus(result);
      if (result !== 'granted') {
        toast('Notification permission denied', 'error');
        return;
      }
    }
    localStorage.setItem('gym_notif', 'true');
    setNotifEnabled(true);
    toast('Timer notifications enabled');
  };

  const handleExport = () => {
    const newData = { ...data, _lastExport: todayStr() };
    saveData(newData);
    onDataChange(newData);
    const blob = new Blob([JSON.stringify(newData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `gym-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (typeof imported !== 'object' || Array.isArray(imported)) {
            alert('Unrecognized file format.');
            return;
          }
          // Single category file (legacy iOS format)
          if (imported.version && imported.category && imported.exercises) {
            const catId = imported.category;
            if (!data[catId]) { alert('Unknown category: ' + catId); return; }
            imported.exercises.forEach(ex => { if (!ex.id) ex.id = uuid(); });
            const newData = { ...data, [catId]: imported };
            saveData(newData);
            onDataChange(newData);
            alert(`Imported ${imported.exercises.length} exercises into ${CATEGORIES.find(c=>c.id===catId)?.name || catId}`);
            return;
          }
          // Unified data.json format
          let count = 0;
          const newData = { ...data };
          CATEGORIES.forEach(c => {
            if (imported[c.id] && imported[c.id].exercises) {
              imported[c.id].exercises.forEach(ex => { if (!ex.id) ex.id = uuid(); });
              newData[c.id] = imported[c.id];
              count += imported[c.id].exercises.length;
            }
          });
          if (count > 0) {
            saveData(newData);
            onDataChange(newData);
            alert(`Imported ${count} exercises across ${CATEGORIES.filter(c=>imported[c.id]).length} categories.`);
          } else {
            alert('No valid workout data found in file.');
          }
        } catch(err) {
          alert('Error reading file: ' + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  return (
    <div>
      <div style={{ margin:'16px' }}>
        <h3 style={{
          fontSize:'13px', color:'var(--text3)', textTransform:'uppercase',
          letterSpacing:'0.5px', marginBottom:'8px', paddingLeft:'4px'
        }}>Notifications</h3>
        <div style={{ background:'var(--bg2)', borderRadius:'12px', overflow:'hidden' }}>
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'13px 16px'
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
              <Icon name="bell" size={18} />
              <div>
                <div style={{ fontSize:'16px' }}>Timer Alerts</div>
                <div style={{ fontSize:'12px', color:'var(--text3)', marginTop:'2px' }}>
                  {notifStatus === 'unsupported' ? 'Not supported on this device' :
                   notifStatus === 'denied' ? 'Blocked — enable in Settings' :
                   'Notify when rest timer ends'}
                </div>
              </div>
            </div>
            <button onClick={handleNotifToggle} style={{
              width:'50px', height:'30px', borderRadius:'15px', padding:'2px',
              background: notifEnabled ? 'var(--green)' : 'var(--bg4)',
              transition:'background 0.2s', flexShrink:0, border:'none'
            }}>
              <div style={{
                width:'26px', height:'26px', borderRadius:'13px', background:'#fff',
                transition:'transform 0.2s',
                transform: notifEnabled ? 'translateX(20px)' : 'translateX(0)'
              }} />
            </button>
          </div>
        </div>
      </div>

      <div style={{ margin:'16px' }}>
        <h3 style={{
          fontSize:'13px', color:'var(--text3)', textTransform:'uppercase',
          letterSpacing:'0.5px', marginBottom:'8px', paddingLeft:'4px'
        }}>About</h3>
        <div style={{ background:'var(--bg2)', borderRadius:'12px', overflow:'hidden' }}>
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'13px 16px', borderBottom:'1px solid var(--bg3)'
          }}>
            <span style={{ fontSize:'16px' }}>Storage</span>
            <span style={{ fontSize:'16px', color:'var(--text3)' }}>localStorage</span>
          </div>
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'13px 16px', borderBottom:'1px solid var(--bg3)'
          }}>
            <span style={{ fontSize:'16px' }}>Last Saved</span>
            <span style={{ fontSize:'16px', color:'var(--text3)' }}>{data._lastSaved ? formatDate(data._lastSaved) : 'Never'}</span>
          </div>
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'13px 16px'
          }}>
            <span style={{ fontSize:'16px' }}>Last Exported</span>
            <span style={{ fontSize:'16px', color:'var(--text3)' }}>{data._lastExport ? formatDate(data._lastExport) : 'Never'}</span>
          </div>
        </div>
      </div>

      <div style={{ margin:'16px' }}>
        <h3 style={{
          fontSize:'13px', color:'var(--text3)', textTransform:'uppercase',
          letterSpacing:'0.5px', marginBottom:'8px', paddingLeft:'4px'
        }}>Data Management</h3>
        <div style={{ background:'var(--bg2)', borderRadius:'12px', overflow:'hidden' }}>
          <div style={{ padding:'13px 16px', borderBottom:'1px solid var(--bg3)' }}>
            <button onClick={handleExport} style={{ width:'100%', display:'flex', alignItems:'center', gap:'8px', textAlign:'left' }}>
              <Icon name="upload" size={18} />
              <span style={{ fontSize:'16px' }}>Export JSON Backup</span>
            </button>
          </div>
          <div style={{ padding:'13px 16px', borderBottom:'1px solid var(--bg3)' }}>
            <button onClick={handleImport} style={{ width:'100%', display:'flex', alignItems:'center', gap:'8px', textAlign:'left' }}>
              <Icon name="download" size={18} />
              <span style={{ fontSize:'16px' }}>Import JSON File</span>
            </button>
          </div>
          <div style={{ padding:'13px 16px' }}>
            <button onClick={() => setShowResetConfirm(true)} style={{ width:'100%', display:'flex', alignItems:'center', gap:'8px', textAlign:'left', color:'var(--red)' }}>
              <Icon name="trash-2" size={18} />
              <span style={{ fontSize:'16px' }}>Reset All Data</span>
            </button>
          </div>
        </div>
      </div>

      {/* Reset confirmation dialog */}
      {showResetConfirm && (
        <>
          <div onClick={() => setShowResetConfirm(false)} style={{
            position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:200,
            animation:'fadeIn 0.2s ease'
          }} />
          <div style={{
            position:'fixed', top:'50%', left:'50%', transform:'translate(-50%,-50%)', zIndex:201,
            background:'var(--card)', borderRadius:'14px', padding:'24px', width:'min(320px, 85vw)',
            boxShadow:'var(--shadow-lg)', border:'1px solid var(--card-border)',
            animation:'fadeIn 0.2s ease'
          }}>
            <div style={{ fontSize:'17px', fontWeight:700, marginBottom:'8px' }}>Reset All Data?</div>
            <div style={{ fontSize:'14px', color:'var(--text2)', marginBottom:'20px', lineHeight:'1.5' }}>
              This will permanently delete all your workout history, exercises, and settings. This action cannot be undone.
            </div>
            <div style={{ display:'flex', gap:'10px' }}>
              <button onClick={() => setShowResetConfirm(false)} style={{
                flex:1, padding:'11px', borderRadius:'var(--radius)', fontSize:'15px', fontWeight:600,
                background:'var(--bg3)', color:'var(--text)'
              }}>Cancel</button>
              <button onClick={() => {
                const fresh = {};
                CATEGORIES.forEach(c => { fresh[c.id] = { exercises: [] }; });
                localStorage.setItem(DB_KEY, JSON.stringify(fresh));
                onDataChange(fresh);
                setShowResetConfirm(false);
                toast('All data has been reset');
              }} style={{
                flex:1, padding:'11px', borderRadius:'var(--radius)', fontSize:'15px', fontWeight:600,
                background:'var(--red)', color:'#fff'
              }}>Reset</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ==================== MAIN APP ====================
function App() {
  const [data, setData] = useState(null);
  const [currentTab, setCurrentTab] = useState('push');
  const [viewStack, setViewStack] = useState([{ view: 'category', params: {} }]);
  const [modal, setModal] = useState(null);
  const [modalParams, setModalParams] = useState({});
  const [confirmDialog, setConfirmDialog] = useState(null);
  const [showHeaderMenu, setShowHeaderMenu] = useState(false);
  const [minimizedWorkout, setMinimizedWorkout] = useState(null);
  const toast = useToast();

  // Init data
  useEffect(() => {
    (async () => {
      let d = loadData();
      if (!d) d = await initSeedData();
      setData(d);
    })();
  }, []);

  // Register service worker
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  }, []);

  const updateData = useCallback((newData) => {
    saveData(newData);
    setData({ ...newData });
  }, []);

  const currentView = viewStack[viewStack.length - 1];

  const navigate = useCallback((view, params = {}) => {
    setViewStack(prev => [...prev, { view, params }]);
  }, []);

  const goBack = useCallback(() => {
    setViewStack(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
  }, []);

  const switchTab = useCallback((tabId) => {
    setCurrentTab(tabId);
    setViewStack([{ view: tabId === 'settings' ? 'settings' : 'category', params: {} }]);
  }, []);

  const handleNewWorkout = (catId) => {
    setModalParams({ catId });
    setModal('workout');
  };

  const handleMinimizeWorkout = (workoutState) => {
    setMinimizedWorkout(workoutState);
    setModal(null);
  };

  const handleResumeWorkout = () => {
    if (!minimizedWorkout) return;
    setModalParams({ catId: minimizedWorkout.catId, resumeState: minimizedWorkout });
    setModal('workout');
  };

  const handleDiscardWorkout = () => {
    setMinimizedWorkout(null);
    setModal(null);
  };

  const handleSaveWorkout = ({ catId, date, note, exercises: exStates }) => {
    const newData = JSON.parse(JSON.stringify(data));
    let saved = false;

    exStates.forEach(wex => {
      const hasValid = wex.sets.some(s => s.weight > 0 || s.reps > 0);
      if (!hasValid) return;

      const ex = getExercise(newData, catId, wex.id);
      if (!ex) return;

      if (!ex.sessions) ex.sessions = [];
      ex.sessions = ex.sessions.filter(s => s.date !== date);
      ex.sessions.push({
        date,
        note,
        sets: wex.sets.map(s => ({ weight: s.weight, reps: s.reps, effort: s.effort }))
      });
      saved = true;
    });

    if (saved) updateData(newData);
    setMinimizedWorkout(null);
    setModal(null);
  };

  const handleAddExercise = ({ name }) => {
    const newData = JSON.parse(JSON.stringify(data));
    if (!newData[currentTab]) return;
    newData[currentTab].exercises.push({
      id: uuid(), name, repRange: '', active: true, sessions: []
    });
    updateData(newData);
    setModal(null);
  };

  const handleDeleteSession = (catId, exId, dateStr) => {
    setConfirmDialog({
      title: 'Delete Session',
      message: 'Are you sure you want to delete this workout session?',
      onConfirm: () => {
        const newData = JSON.parse(JSON.stringify(data));
        const ex = getExercise(newData, catId, exId);
        if (ex) {
          ex.sessions = (ex.sessions || []).filter(s => s.date !== dateStr);
          updateData(newData);
        }
        setConfirmDialog(null);
      }
    });
  };

  const handleEditSession = (catId, exId, dateStr) => {
    const allExercises = getActiveExercises(data, catId);
    const editExercises = [];
    let note = '';
    allExercises.forEach(ex => {
      const session = (ex.sessions || []).find(s => s.date === dateStr);
      if (session) {
        editExercises.push({ id: ex.id, sets: session.sets });
        if (session.note && !note) note = session.note;
      }
    });
    if (editExercises.length === 0) return;
    setModalParams({
      catId,
      editSession: {
        date: dateStr,
        note,
        exercises: editExercises
      }
    });
    setModal('workout');
  };

  const handleRestoreExercise = (exId) => {
    const newData = JSON.parse(JSON.stringify(data));
    const ex = getExercise(newData, currentTab, exId);
    if (ex) { ex.active = true; updateData(newData); }
    setModal(null);
  };

  const handlePermanentDelete = (exId) => {
    setConfirmDialog({
      title: 'Delete Exercise',
      message: 'This will permanently delete this exercise and all its history.',
      onConfirm: () => {
        const newData = JSON.parse(JSON.stringify(data));
        if (newData[currentTab]) {
          newData[currentTab].exercises = newData[currentTab].exercises.filter(e => e.id !== exId);
          updateData(newData);
        }
        setConfirmDialog(null);
        setModal(null);
      }
    });
  };

  const [editingName, setEditingName] = useState(false);
  const [editNameValue, setEditNameValue] = useState('');

  const handleStartEdit = () => {
    const ex = getExercise(data, currentView.params.catId, currentView.params.exId);
    if (ex) {
      setEditNameValue(ex.name);
      setEditingName(true);
    }
  };

  const handleSaveName = () => {
    if (!editNameValue.trim()) return;
    const newData = JSON.parse(JSON.stringify(data));
    const ex = getExercise(newData, currentView.params.catId, currentView.params.exId);
    if (ex) {
      ex.name = editNameValue.trim();
      updateData(newData);
    }
    setEditingName(false);
  };

  const handleArchiveExercise = () => {
    const { catId, exId } = currentView.params;
    const newData = JSON.parse(JSON.stringify(data));
    const ex = getExercise(newData, catId, exId);
    if (ex) {
      ex.active = false;
      updateData(newData);
      goBack();
      toast('Exercise archived');
    }
  };

  if (!data) return null;

  let headerTitle = '';
  let showBack = viewStack.length > 1;
  let showArchiveBtn = false;
  let showAddBtn = false;
  let showEditBtn = false;

  if (currentView.view === 'category') {
    const cat = CATEGORIES.find(c => c.id === currentTab);
    headerTitle = cat ? cat.name : '';
    showArchiveBtn = getArchivedExercises(data, currentTab).length > 0;
    showAddBtn = true;
  } else if (currentView.view === 'detail') {
    const ex = getExercise(data, currentView.params.catId, currentView.params.exId);
    headerTitle = ex ? ex.name : 'Exercise';
    showEditBtn = true;
  } else if (currentView.view === 'settings') {
    headerTitle = 'Settings';
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100dvh' }}>
      {/* Header */}
      <div style={{
        padding: 'calc(var(--safe-top) + 8px) 16px 8px',
        background:'var(--bg)', borderBottom:'1px solid var(--bg3)', flexShrink:0
      }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'8px', flex:1, minWidth:0 }}>
            {showBack && (
              <button onClick={() => { setEditingName(false); goBack(); }} style={{ color:'var(--blue)', padding:'6px', flexShrink:0 }}>
                <Icon name="chevron-left" size={22} />
              </button>
            )}
            {editingName ? (
              <input
                autoFocus
                value={editNameValue}
                onChange={e => setEditNameValue(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') handleSaveName(); }}
                style={{ fontSize:'22px', fontWeight:700, padding:'4px 8px', flex:1, minWidth:0 }}
              />
            ) : (
              <h1 style={{ fontSize:'28px', fontWeight:700, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{headerTitle}</h1>
            )}
          </div>
          <div style={{ display:'flex', gap:'8px', flexShrink:0 }}>
            {showEditBtn && !editingName && (
              <div style={{ position:'relative' }}>
                <button onClick={() => setShowHeaderMenu(!showHeaderMenu)} style={{ padding:'6px', color:'var(--text2)' }}>
                  <Icon name="ellipsis-vertical" size={20} />
                </button>
                {showHeaderMenu && (
                  <>
                    <div onClick={() => setShowHeaderMenu(false)} style={{ position:'fixed', inset:0, zIndex:50 }} />
                    <div style={{
                      position:'absolute', right:0, top:'100%', marginTop:'4px', zIndex:51,
                      background:'var(--card)', border:'1px solid var(--card-border)', borderRadius:'var(--radius)',
                      boxShadow:'var(--shadow-lg)', minWidth:'160px', overflow:'hidden'
                    }}>
                      <button onClick={() => { setShowHeaderMenu(false); handleStartEdit(); }} style={{
                        width:'100%', padding:'12px 16px', fontSize:'15px', color:'var(--text)',
                        display:'flex', alignItems:'center', gap:'10px', textAlign:'left',
                        borderBottom:'1px solid var(--card-border)'
                      }}>
                        <Icon name="edit" size={16} /> Rename
                      </button>
                      <button onClick={() => { setShowHeaderMenu(false); handleArchiveExercise(); }} style={{
                        width:'100%', padding:'12px 16px', fontSize:'15px', color:'var(--red)',
                        display:'flex', alignItems:'center', gap:'10px', textAlign:'left'
                      }}>
                        <Icon name="archive" size={16} /> Archive
                      </button>
                    </div>
                  </>
                )}
              </div>
            )}
            {editingName && (
              <>
                <button onClick={() => setEditingName(false)} style={{ padding:'6px', color:'var(--text3)', fontSize:'14px', fontWeight:500 }}>Cancel</button>
                <button onClick={handleSaveName} style={{ padding:'6px', color:'var(--blue)', fontSize:'14px', fontWeight:600 }}>Save</button>
              </>
            )}
            {showArchiveBtn && (
              <button onClick={() => setModal('archived')} style={{ padding:'6px', color:'var(--blue)' }}>
                <Icon name="archive" size={22} />
              </button>
            )}
            {showAddBtn && (
              <button onClick={() => setModal('addExercise')} style={{ padding:'6px', color:'var(--blue)' }}>
                <Icon name="plus" size={22} />
              </button>
            )}
            {showAddBtn && !minimizedWorkout && (
              <button onClick={() => handleNewWorkout(currentTab)} style={{ padding:'6px', color:'var(--blue)' }}>
                <Icon name="play" size={20} />
              </button>
            )}
            {showAddBtn && minimizedWorkout && minimizedWorkout.catId === currentTab && (
              <button onClick={handleResumeWorkout} style={{
                padding:'4px 10px', borderRadius:'var(--radius)',
                background:'var(--green)', color:'#fff', fontSize:'13px', fontWeight:600,
                display:'flex', alignItems:'center', gap:'4px'
              }}>
                <Icon name="play" size={14} /> Resume
              </button>
            )}
            {showAddBtn && minimizedWorkout && minimizedWorkout.catId !== currentTab && (
              <button onClick={() => {
                const cat = CATEGORIES.find(c => c.id === minimizedWorkout.catId);
                toast(`Active workout in ${cat ? cat.name : 'another category'}`, 'error');
              }} style={{ padding:'6px', color:'var(--text3)' }}>
                <Icon name="play" size={20} />
              </button>
            )}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', paddingBottom:'20px', background:'var(--bg)' }}>
        {currentView.view === 'category' && (
          <CategoryView
            catId={currentTab}
            data={data}
            onNavigateDetail={(catId, exId) => navigate('detail', { catId, exId })}
          />
        )}
        {currentView.view === 'detail' && (
          <ExerciseDetailView
            catId={currentView.params.catId}
            exId={currentView.params.exId}
            data={data}
            onDeleteSession={handleDeleteSession}
            onEditSession={handleEditSession}
          />
        )}
        {currentView.view === 'settings' && (
          <SettingsView data={data} onDataChange={setData} />
        )}
      </div>

      {/* Tab Bar */}
      <TabBar currentTab={currentTab} onSwitchTab={switchTab} activeWorkoutCatId={minimizedWorkout ? minimizedWorkout.catId : null} />

      {/* Modals */}
      {modal === 'workout' && (
        <WorkoutModal
          catId={modalParams.catId}
          data={data}
          onSave={handleSaveWorkout}
          onClose={handleDiscardWorkout}
          onMinimize={handleMinimizeWorkout}
          editSession={modalParams.editSession}
          resumeState={modalParams.resumeState}
        />
      )}
      {modal === 'addExercise' && (
        <AddExerciseModal
          onSave={handleAddExercise}
          onClose={() => setModal(null)}
        />
      )}
      {modal === 'archived' && (
        <ArchivedModal
          catId={currentTab}
          data={data}
          onRestore={handleRestoreExercise}
          onDelete={handlePermanentDelete}
          onClose={() => setModal(null)}
        />
      )}

      {/* Confirm Dialog */}
      {confirmDialog && (
        <ConfirmDialog
          title={confirmDialog.title}
          message={confirmDialog.message}
          onConfirm={confirmDialog.onConfirm}
          onCancel={() => setConfirmDialog(null)}
        />
      )}
    </div>
  );
}

// ==================== MOUNT ====================
ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
</script>
</body>
</html>
